<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris - Student Website</title>
    <link rel="stylesheet" type="text/css" href="../css/styles.css" />
    <link rel="stylesheet" type="text/css" href="../css/tetris.css" />

</head>
<body>

    <header>
        <h1>Tetris</h1>
        <p class="tagline">"Tetris noises"</p>
    </header>
    <nav>
        <a href="../index.html">Home</a>
        <a href="aboutme.html">About Me</a>
        <a href="mytown.html">My Town</a>
        <a href ="games.html">Games</a>
    </nav>
    <section class="card">
              <div id="stats">
        <div id="score">Score: 0</div>
        <div id="level">Level: 1</div>
    </div>


    <div class="game-container">
        <div class="hold-container">
            <div class="hold-label">Hold:</div>
            <canvas id="hold" width="100" height="100"></canvas>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="side-container">
            <div class="preview-container">
                <div class="preview-label">Next:</div>
                <canvas id="preview" width="100" height="100"></canvas>
            </div>
        </div>
    </div>

    <div id="controls">
        Controls:<br>
        ← → : Move<br>
        ↑ : Rotate<br>
        ↓ : Drop<br>
        Space : Hard Drop<br>
        Shift : Hold
    </div>
</section>

    <script src="../js/tetris.js"></script>
</body>
</html>
