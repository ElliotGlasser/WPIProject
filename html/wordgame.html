<!DOCTYPE html>
<html lang="en">   
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Game</title>
    <link rel="stylesheet" type="text/css" href="../css/styles.css" />
    <link rel="stylesheet" type="text/css" href="../css/wordgame.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>

<body>
    <header>
        <h1 id="wordtitle">Definetly not Wordle</h1>
        <p class="tagline">Guess the word!</p>
    </header>
    <nav>
        <a id="home-button" href="../index.html">Home</a>
        <a id="aboutme-button" href="aboutme.html">About Me</a>
        <a id="mytown-button" href="mytown.html">My Town</a>
        <a id="numgame-button" href="numgame.html">Number Game</a>
        <a id="wordgame-button" href="wordgame.html">Word Game</a>
    </nav>
    <main>
        <section class="card game-card">
            <h2>Guess the word!</h2>
            <p>Try to guess the secret word. Enter your guess below.</p>
            
            <section class="card" id="guess-history-card">
            
                <table>
                    <tbody id="guess-history-body">
                        <!-- Guess history will be populated here -->
                    </tbody>
                </table>
            </section>

            <input type="text" id="guess-field" maxlength="5" placeholder="APPLE">
            <button onclick="checkGuess()">Enter</button>
            <button onclick="startGame()">New Word</button>

            <p id="message-text"></p>

        </section>



        <section class="card">
            <h2>Letter feedback</h2>
            <table>
                <thead>
                    <tr>
                        <th>Color</th>
                        <th>Meaning</th>
                    </tr>
                </thead>
                <tbody id="letter-feedback-body">
                    <tr>
                        <td class="correct-demo"></td>
                        <td>Correct letter in the correct position</td>
                    </tr>
                    <tr>
                        <td class="close-demo"></td>
                        <td>Correct letter in the wrong position</td>
                    </tr>
                    <tr>
                        <td class="wrong-demo"></td>
                        <td>Incorrect letter</td>
                    </tr>
                </tbody>
        </section>
    </main>
    <h3 id="yay-text">Awesome</h3>
    
    <script src="../js/wordgame.js"></script>

</body>

</html>
